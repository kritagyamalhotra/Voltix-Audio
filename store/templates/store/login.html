<!DOCTYPE html>
<html>
<head>
    <title>Voltix | Manager Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; display: flex; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; margin: auto; }
        .btn-voltix { background: #ff4d4d; color: white; }
    </style>
</head>
<body>
    <div class="login-card shadow">
        <h2 class="text-center mb-4">Manager Login</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-voltix w-100">Access Dashboard</button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">← Back to Store</a>
        </div>
    </div>
</body>
</html>
